<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center V2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:Inter,system-ui,sans-serif;background:#233037;display:flex;align-items:center;justify-content:center;color:#f3f7fa}
.loader{text-align:center}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top-color:#e1342e;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e1342e;margin-top:12px}
iframe{position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:9999}
</style>
</head>
<body>
<div class="loader" id="loader">
<div class="spinner"></div>
<div>Command Center V2 wird geladen...</div>
<div class="error" id="error" style="display:none"></div>
</div>
<script>
var SB='https://cmhpzgozurvvvhkdnuwz.supabase.co';
var AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtaHB6Z296dXJ2dnZoa2RudXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMzNTU2MTUsImV4cCI6MjA1ODkzMTYxNX0.tQgphVsPaLbmjuHfm_WNRw71J9bEhJaHxzSxLNjQxMA';
fetch(SB+'/rest/v1/dashboard_html?id=eq.1&select=content',{
headers:{apikey:AK,'Accept':'application/json'}
})
.then(function(r){return r.json()})
.then(function(data){
if(!data[0]||!data[0].content)throw new Error('Kein Dashboard-Content gefunden');
var b64=data[0].content;
var bin=atob(b64);
var bytes=new Uint8Array(bin.length);
for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
var html=new TextDecoder('utf-8').decode(bytes);
var blob=new Blob([html],{type:'text/html;charset=utf-8'});
var url=URL.createObjectURL(blob);
var f=document.createElement('iframe');
f.src=url;
f.style='position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:9999';
document.getElementById('loader').style.display='none';
document.body.appendChild(f);
})
.catch(function(e){
document.getElementById('error').style.display='block';
document.getElementById('error').textContent='Fehler: '+e.message;
});
</script>
</body>
</html>
