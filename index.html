<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Center V2 — Noah Lutz</title>
<style>
body{margin:0;font-family:Inter,system-ui,sans-serif;background:#233037;display:flex;align-items:center;justify-content:center;height:100vh;color:#f3f7fa}
.loader{text-align:center}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top-color:#e1342e;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#e1342e;margin-top:12px}
</style>
</head>
<body>
<div class="loader" id="loader">
<div class="spinner"></div>
<div>Command Center V2 wird geladen...</div>
<div class="error" id="error" style="display:none"></div>
</div>
<script>
const SUPABASE_URL='https://cmhpzgozurvvvhkdnuwz.supabase.co';
const ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNtaHB6Z296dXJ2dnZoa2RudXd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMzNTU2MTUsImV4cCI6MjA1ODkzMTYxNX0.tQgphVsPaLbmjuHfm_WNRw71J9bEhJaHxzSxLNjQxMA';
fetch(SUPABASE_URL+'/rest/v1/dashboard_html?id=eq.1&select=content',{
headers:{apikey:ANON_KEY,'Accept':'application/json'}
})
.then(r=>r.json())
.then(data=>{
if(!data[0]||!data[0].content)throw new Error('No dashboard content found');
const b64=data[0].content;
const bin=atob(b64);
const bytes=new Uint8Array(bin.length);
for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
const html=new TextDecoder('utf-8').decode(bytes);
document.open();
document.write(html);
document.close();
})
.catch(e=>{
document.getElementById('error').style.display='block';
document.getElementById('error').textContent='Fehler: '+e.message;
});
</script>
</body>
</html>
